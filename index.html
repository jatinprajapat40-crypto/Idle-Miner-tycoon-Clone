<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Super Idle Miner Tycoon - Ultimate Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--neon-blue:#00d4ff;--neon-pink:#ff006e;--neon-green:#39ff14;--neon-gold:#ffd700;
--neon-purple:#b026ff;--neon-orange:#ff6a00;--neon-cyan:#00fff7;--neon-red:#ff073a;
--bg-dark:#0a0a1a;--bg-mid:#12122a;--bg-light:#1a1a3e;--panel:#0d0d2b;
}
html,body{height:100%;overflow:hidden;background:var(--bg-dark);color:#e0e0ff;font-family:'Exo 2',sans-serif}
canvas#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}
.scrollbar-hide::-webkit-scrollbar{display:none}
.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}

.top-bar{
background:linear-gradient(135deg,rgba(0,20,60,0.95),rgba(20,0,60,0.95));
border-bottom:2px solid var(--neon-blue);
padding:6px 12px;display:flex;align-items:center;justify-content:space-between;
box-shadow:0 0 30px rgba(0,212,255,0.2);position:relative;z-index:10;flex-wrap:wrap;gap:4px;
}
.top-bar::after{
content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
background:linear-gradient(90deg,transparent,var(--neon-blue),var(--neon-purple),var(--neon-pink),transparent);
animation:borderGlow 3s ease-in-out infinite;
}
@keyframes borderGlow{0%,100%{opacity:0.5}50%{opacity:1}}
.currency-box{
display:flex;align-items:center;gap:6px;
background:linear-gradient(135deg,rgba(0,0,0,0.6),rgba(0,20,60,0.6));
border:1px solid rgba(0,212,255,0.3);border-radius:10px;padding:4px 10px;
backdrop-filter:blur(10px);transition:all 0.3s;
}
.currency-box:hover{border-color:var(--neon-blue);box-shadow:0 0 20px rgba(0,212,255,0.3)}
.currency-icon{font-size:20px;filter:drop-shadow(0 0 8px currentColor)}
.currency-val{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:var(--neon-gold);text-shadow:0 0 10px var(--neon-gold)}
.currency-label{font-size:9px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px}
.currency-sub{font-size:10px;color:var(--neon-green);font-family:'Orbitron',monospace}

.main-area{flex:1;display:flex;overflow:hidden}
.mine-view{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden}
.mine-header{
background:linear-gradient(135deg,rgba(0,20,60,0.9),rgba(30,0,60,0.9));
border-bottom:1px solid rgba(0,212,255,0.3);
padding:6px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;
}
.mine-title{font-family:'Orbitron';font-size:14px;font-weight:700;
background:linear-gradient(90deg,var(--neon-gold),var(--neon-orange));
-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mine-content{flex:1;display:grid;grid-template-columns:120px 1fr;grid-template-rows:130px 1fr;overflow:hidden}

.warehouse-zone{
grid-column:1/-1;grid-row:1;position:relative;overflow:hidden;
background:linear-gradient(180deg,rgba(0,30,60,0.9),rgba(0,15,40,0.95));
border-bottom:2px solid rgba(0,212,255,0.4);
}
.wh-roof{position:absolute;top:0;left:0;right:0;height:30px;
background:linear-gradient(180deg,rgba(0,50,100,0.8),transparent);
border-bottom:1px solid rgba(0,212,255,0.2)}
.wh-roof::before{content:'WAREHOUSE';position:absolute;top:6px;left:50%;transform:translateX(-50%);
font-family:'Orbitron';font-size:10px;letter-spacing:3px;color:var(--neon-blue);text-shadow:0 0 10px var(--neon-blue)}
.conveyor-area{position:absolute;bottom:35px;left:130px;right:180px;height:28px}
.conv-belt{position:absolute;bottom:0;left:0;right:0;height:12px;
background:repeating-linear-gradient(90deg,#1a1a3e 0px,#1a1a3e 18px,#2a2a4e 18px,#2a2a4e 20px);
background-size:40px 100%;animation:convMove 0.4s linear infinite;
border:1px solid rgba(0,212,255,0.3);border-radius:6px;
box-shadow:0 0 15px rgba(0,212,255,0.2)}
@keyframes convMove{to{background-position-x:-40px}}
.conv-roller{position:absolute;top:-8px;width:18px;height:18px;
background:radial-gradient(circle at 35% 35%,#4a4a8a,#1a1a3e);
border:2px solid rgba(0,212,255,0.5);border-radius:50%;animation:spin 0.5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ore-crate{position:absolute;bottom:15px;width:35px;height:25px;
background:linear-gradient(180deg,rgba(0,212,255,0.3),rgba(0,100,200,0.3));
border:2px solid rgba(0,212,255,0.5);border-radius:4px;animation:crateMove 3.5s linear infinite}
@keyframes crateMove{0%{left:-50px}100%{left:calc(100% + 50px)}}
.ore-crate::before{content:'📦';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px}
.wh-worker{position:absolute;bottom:28px;animation:workerBob 0.8s ease-in-out infinite}
@keyframes workerBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.cash-station{position:absolute;right:20px;bottom:20px;text-align:center}
.cash-reg{width:50px;height:38px;background:linear-gradient(180deg,rgba(255,215,0,0.3),rgba(200,150,0,0.3));
border:2px solid var(--neon-gold);border-radius:5px;animation:cashPulse 2s ease-in-out infinite;
box-shadow:0 0 20px rgba(255,215,0,0.3);display:flex;align-items:center;justify-content:center;
font-family:'Orbitron';font-size:10px;color:var(--neon-gold);font-weight:700}
@keyframes cashPulse{0%,100%{box-shadow:0 0 20px rgba(255,215,0,0.3)}50%{box-shadow:0 0 40px rgba(255,215,0,0.6)}}
.float-coin{position:absolute;font-size:16px;animation:coinUp 2s ease-out infinite;pointer-events:none}
@keyframes coinUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-40px) scale(0.5);opacity:0}}
.wh-stats{position:absolute;bottom:4px;left:6px;background:rgba(0,0,0,0.7);
border:1px solid rgba(0,212,255,0.3);border-radius:6px;padding:4px 8px;font-size:9px}
.wh-controls{position:absolute;bottom:4px;right:150px;display:flex;gap:3px}

.elev-zone{
grid-column:1;grid-row:2;position:relative;overflow:hidden;
background:linear-gradient(90deg,rgba(0,10,30,0.95),rgba(0,20,50,0.9),rgba(0,10,30,0.95));
border-right:2px solid rgba(0,212,255,0.3);
}
.elev-frame{position:absolute;top:30px;bottom:0;left:10px;right:10px;
border:2px solid rgba(0,212,255,0.2);border-top:none;
background:linear-gradient(180deg,rgba(0,5,20,0.9),rgba(0,0,10,0.95))}
.elev-rail{position:absolute;top:0;bottom:0;width:3px;
background:linear-gradient(180deg,rgba(0,212,255,0.6),rgba(0,100,200,0.3),rgba(0,212,255,0.6));
box-shadow:0 0 8px rgba(0,212,255,0.3)}
.elev-rail.l{left:3px}.elev-rail.r{right:3px}
.elev-pulley-box{position:absolute;top:0;left:50%;transform:translateX(-50%);width:50px;height:28px;
background:linear-gradient(180deg,rgba(0,50,100,0.8),rgba(0,30,60,0.8));
border:2px solid rgba(0,212,255,0.5);border-radius:5px 5px 0 0;z-index:5;
display:flex;align-items:center;justify-content:center}
.elev-pulley{width:22px;height:22px;background:radial-gradient(circle at 35% 35%,#4a6a9a,#1a2a4a);
border:3px solid rgba(0,212,255,0.6);border-radius:50%;animation:spin 1.5s linear infinite}
.elev-cable{position:absolute;top:28px;left:50%;transform:translateX(-50%);width:2px;
background:repeating-linear-gradient(180deg,rgba(0,212,255,0.6) 0px,rgba(0,212,255,0.6) 4px,rgba(0,100,200,0.3) 4px,rgba(0,100,200,0.3) 8px);
z-index:3;transition:height 0.3s}
.elev-car{position:absolute;left:50%;transform:translateX(-50%);width:75px;height:55px;z-index:4;transition:bottom 0.3s}
.elev-body{width:100%;height:100%;
background:linear-gradient(180deg,rgba(0,60,120,0.8),rgba(0,30,60,0.8),rgba(0,15,40,0.9));
border:2px solid rgba(0,212,255,0.5);border-radius:6px;position:relative;
box-shadow:0 0 20px rgba(0,212,255,0.3)}
.elev-window{position:absolute;top:6px;left:6px;right:6px;height:25px;
background:linear-gradient(180deg,rgba(0,0,20,0.9),rgba(0,0,10,0.95));
border:1px solid rgba(0,212,255,0.4);border-radius:3px;overflow:hidden}
.elev-ore-fill{position:absolute;bottom:0;left:0;right:0;
background:linear-gradient(180deg,var(--neon-gold),#cc9900);border-radius:12px 12px 0 0;
transition:height 0.5s;box-shadow:0 0 15px var(--neon-gold)}
.elev-light{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:8px;height:8px;
border-radius:50%;animation:lightBlink 2s ease-in-out infinite}
@keyframes lightBlink{0%,49%{background:var(--neon-red);box-shadow:0 0 10px var(--neon-red)}
50%,100%{background:var(--neon-green);box-shadow:0 0 10px var(--neon-green)}}
.elev-ctrl{position:absolute;top:34px;left:3px;right:3px;z-index:10}
.elev-stats-box{position:absolute;bottom:6px;left:3px;right:3px;z-index:10;
background:rgba(0,0,0,0.8);border:1px solid rgba(0,212,255,0.2);border-radius:4px;padding:4px;font-size:8px}

.shafts-zone{grid-column:2;grid-row:2;overflow-y:auto;padding:4px}
.shaft-card{
position:relative;overflow:hidden;min-height:100px;margin-bottom:4px;border-radius:8px;
background:linear-gradient(90deg,rgba(10,10,30,0.9),rgba(20,15,40,0.85),rgba(15,10,35,0.9));
border:2px solid rgba(0,212,255,0.2);
box-shadow:inset 0 0 30px rgba(0,0,0,0.5),0 0 10px rgba(0,212,255,0.1);
transition:border-color 0.3s,box-shadow 0.3s;
}
.shaft-card:hover{border-color:rgba(0,212,255,0.5)}
.shaft-locked{min-height:50px;opacity:0.5;display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.shaft-bg{position:absolute;inset:0;pointer-events:none}
.shaft-rocks{position:absolute;right:0;top:0;bottom:0;width:100px;
background:linear-gradient(90deg,transparent 0%,rgba(30,20,60,0.6) 30%,rgba(50,30,80,0.8) 100%);
border-left:2px solid rgba(176,38,255,0.2)}
.rock-face{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:65px;height:55px;
background:radial-gradient(ellipse,rgba(40,20,80,0.8),rgba(20,10,40,0.9));
border-radius:8px;border:2px solid rgba(176,38,255,0.3)}
.ore-vein{position:absolute;width:14px;height:14px;border-radius:50%;
animation:sparkle 1.5s ease-in-out infinite;
box-shadow:0 0 15px currentColor,0 0 30px currentColor}
@keyframes sparkle{0%,100%{opacity:0.4;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
.mine-area{position:absolute;right:85px;top:50%;transform:translateY(-50%);width:65px;height:75px}
.miner-fig{position:relative;width:40px;height:58px;animation:minerDig 0.7s ease-in-out infinite}
@keyframes minerDig{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg) translateX(-2px)}
50%{transform:rotate(4deg) translateX(1px)}75%{transform:rotate(-8deg) translateX(-1px)}}
.m-helmet{position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:14px;
background:linear-gradient(180deg,var(--neon-gold),#cc9900);border-radius:12px 12px 3px 3px;
border:1px solid #ffea00}
.m-lamp{position:absolute;top:2px;left:50%;transform:translateX(-50%);width:8px;height:8px;
background:radial-gradient(circle,#fff,var(--neon-gold));border-radius:50%;
animation:lampGlow 0.8s ease-in-out infinite}
@keyframes lampGlow{0%,100%{box-shadow:0 0 15px var(--neon-gold)}50%{box-shadow:0 0 25px var(--neon-gold),0 0 50px rgba(255,215,0,0.7)}}
.m-head{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:18px;height:18px;
background:radial-gradient(circle at 40% 40%,#ffcc99,#cc9966);border-radius:50%}
.m-body{position:absolute;top:26px;left:50%;transform:translateX(-50%);width:22px;height:18px;
background:linear-gradient(180deg,var(--neon-orange),#cc4400);border-radius:3px 3px 0 0}
.m-arm{position:absolute;top:28px;width:8px;height:18px;
background:linear-gradient(180deg,var(--neon-orange),#cc4400);border-radius:3px}
.m-arm.al{left:1px;transform:rotate(25deg)}.m-arm.ar{right:-10px;transform:rotate(-40deg)}
.pickaxe{position:absolute;top:18px;right:-26px;width:30px;height:5px;
background:linear-gradient(90deg,#8B4513,#a0522d);border-radius:2px;
transform-origin:left center;animation:pickHit 0.4s ease-in-out infinite}
@keyframes pickHit{0%,100%{transform:rotate(0)}50%{transform:rotate(-55deg)}}
.pickaxe::after{content:'';position:absolute;right:-7px;top:-4px;width:10px;height:14px;
background:linear-gradient(135deg,#bbb,#666);clip-path:polygon(0 50%,100% 0,100% 100%)}
.m-legs{position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:flex;gap:2px}
.m-leg{width:8px;height:12px;background:linear-gradient(180deg,#4169e1,#2849b1);border-radius:0 0 2px 2px}
.light-beam{position:absolute;top:10px;left:45px;width:80px;height:40px;
background:linear-gradient(90deg,rgba(255,255,0,0.25),rgba(255,255,0,0.08),transparent);
clip-path:polygon(0 40%,100% 0,100% 100%,0 60%);
animation:beamPulse 1s ease-in-out infinite;pointer-events:none}
@keyframes beamPulse{0%,100%{opacity:0.3}50%{opacity:0.5}}
.dust{position:absolute;width:6px;height:6px;
background:radial-gradient(circle,rgba(100,80,200,0.7),transparent);
border-radius:50%;animation:dustUp 1.5s ease-out infinite;pointer-events:none}
@keyframes dustUp{0%{transform:translateY(0) scale(1);opacity:0.8}100%{transform:translateY(-25px) scale(2);opacity:0}}
.spark{position:absolute;width:4px;height:4px;background:var(--neon-gold);border-radius:50%;
box-shadow:0 0 8px var(--neon-gold);animation:sparkPop 0.5s ease-out infinite}
@keyframes sparkPop{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.3)}100%{opacity:0;transform:scale(0.5) translateY(-8px)}}
.rail-track{position:absolute;bottom:0;left:0;right:100px;height:16px;
background:repeating-linear-gradient(90deg,rgba(30,20,50,0.8) 0px,rgba(30,20,50,0.8) 28px,rgba(40,30,60,0.8) 28px,rgba(40,30,60,0.8) 32px);
border-top:2px solid rgba(0,212,255,0.2)}
.rail-metal{position:absolute;bottom:3px;left:0;right:100px;height:2px;
background:linear-gradient(180deg,rgba(0,212,255,0.5),rgba(0,100,200,0.3));
box-shadow:0 3px 0 rgba(0,100,200,0.3)}
.cart-wrap{position:absolute;bottom:18px;width:55px;height:40px;animation:cartGo 4.5s ease-in-out infinite}
@keyframes cartGo{0%{left:calc(100% - 85px)}40%{left:80px}60%{left:80px}100%{left:calc(100% - 85px)}}
.cart{width:100%;height:100%;position:relative;animation:cartBounce 0.25s ease-in-out infinite}
@keyframes cartBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.cart-box{position:absolute;bottom:12px;left:3px;width:44px;height:22px;
background:linear-gradient(180deg,rgba(0,212,255,0.3),rgba(0,60,120,0.5));
border:2px solid rgba(0,212,255,0.5);border-radius:3px 3px 0 0;
clip-path:polygon(5% 100%,0 0,100% 0,95% 100%)}
.cart-ore-fill{position:absolute;top:2px;left:3px;right:3px;height:40%;
background:linear-gradient(180deg,var(--neon-gold),#cc9900);border-radius:10px 10px 0 0}
.cart-whl{position:absolute;bottom:0;width:12px;height:12px;
background:radial-gradient(circle at 35% 35%,#4a4a8a,#1a1a3e);
border:2px solid rgba(0,212,255,0.5);border-radius:50%;animation:spin 0.3s linear infinite}
.cart-whl.wl{left:5px}.cart-whl.wr{right:5px}
.shaft-info{position:absolute;top:5px;left:6px;z-index:5}
.shaft-label{display:inline-flex;align-items:center;gap:4px;
background:rgba(0,0,0,0.7);border:1px solid rgba(0,212,255,0.3);
padding:2px 6px;border-radius:5px}
.shaft-lvl{font-size:9px;background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));
padding:1px 6px;border-radius:8px;color:#fff;font-weight:700}
.shaft-prod{font-size:11px;color:var(--neon-green);font-weight:700;font-family:'Orbitron';
text-shadow:0 0 8px var(--neon-green)}
.shaft-ctrl{position:absolute;top:5px;right:108px;display:flex;flex-direction:column;gap:2px;z-index:5}
.accident-overlay{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
background:rgba(255,0,0,0.15);border-radius:inherit;animation:accidentPulse 0.5s ease-in-out infinite}
@keyframes accidentPulse{0%,100%{background:rgba(255,0,0,0.15)}50%{background:rgba(255,0,0,0.3)}}

.btn-up{
background:linear-gradient(180deg,rgba(0,200,100,0.8),rgba(0,150,70,0.8));
border:1px solid var(--neon-green);color:#fff;font-weight:700;cursor:pointer;
border-radius:5px;transition:all 0.2s;font-size:10px;padding:3px 6px;
box-shadow:0 0 10px rgba(57,255,20,0.2);font-family:'Exo 2',sans-serif;
}
.btn-up:hover:not(:disabled){transform:scale(1.05);box-shadow:0 0 20px rgba(57,255,20,0.4)}
.btn-up:disabled{background:rgba(50,50,80,0.5);border-color:rgba(100,100,150,0.3);cursor:not-allowed;opacity:0.5;box-shadow:none}
.btn-max{
background:linear-gradient(180deg,rgba(255,106,0,0.8),rgba(200,80,0,0.8));
border:1px solid var(--neon-orange);color:#fff;font-weight:800;cursor:pointer;
border-radius:5px;transition:all 0.2s;font-size:9px;padding:3px 6px;
box-shadow:0 0 10px rgba(255,106,0,0.2);font-family:'Exo 2',sans-serif;
}
.btn-max:hover:not(:disabled){transform:scale(1.05)}
.btn-max:disabled{background:rgba(50,50,80,0.5);border-color:rgba(100,100,150,0.3);cursor:not-allowed;opacity:0.5}
.btn-action{
background:linear-gradient(180deg,rgba(0,100,200,0.7),rgba(0,60,150,0.7));
border:1px solid var(--neon-blue);color:#fff;font-weight:600;cursor:pointer;
border-radius:5px;transition:all 0.2s;font-size:10px;padding:4px 10px;
font-family:'Exo 2',sans-serif;
}
.btn-action:hover{transform:scale(1.05);box-shadow:0 0 15px rgba(0,212,255,0.4)}
.btn-action:disabled{opacity:0.4;cursor:not-allowed}

.side-panel{width:300px;display:flex;flex-direction:column;
background:linear-gradient(180deg,rgba(10,10,30,0.98),rgba(5,5,20,0.98));
border-left:2px solid rgba(0,212,255,0.3)}
.tab-bar{display:flex;flex-wrap:wrap;background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(0,212,255,0.2)}
.tab-btn{flex:1;min-width:0;padding:5px 2px;font-size:9px;font-weight:700;cursor:pointer;
border:none;background:transparent;color:rgba(255,255,255,0.5);
border-bottom:2px solid transparent;transition:all 0.2s;font-family:'Exo 2',sans-serif;white-space:nowrap}
.tab-btn:hover{color:rgba(255,255,255,0.8);background:rgba(0,212,255,0.05)}
.tab-btn.active{color:var(--neon-blue);border-bottom-color:var(--neon-blue);
background:linear-gradient(180deg,rgba(0,212,255,0.1),transparent)}
.tab-content{flex:1;overflow-y:auto;padding:8px}
.panel-card{background:rgba(0,10,30,0.6);border:1px solid rgba(0,212,255,0.15);
border-radius:6px;padding:8px;margin-bottom:6px;transition:border-color 0.3s}
.panel-card:hover{border-color:rgba(0,212,255,0.4)}

.rarity-common{border-color:rgba(158,158,158,0.5)}
.rarity-rare{border-color:rgba(33,150,243,0.5)}
.rarity-epic{border-color:rgba(176,38,255,0.5)}
.rarity-legendary{border-color:rgba(255,215,0,0.5);animation:legendGlow 2s ease-in-out infinite}
@keyframes legendGlow{0%,100%{box-shadow:0 0 10px rgba(255,215,0,0.1)}50%{box-shadow:0 0 25px rgba(255,215,0,0.3)}}
.rarity-mythic{border-color:rgba(255,0,110,0.5);animation:mythicGlow 1.5s ease-in-out infinite}
@keyframes mythicGlow{0%,100%{box-shadow:0 0 15px rgba(255,0,110,0.2)}50%{box-shadow:0 0 30px rgba(255,0,110,0.5)}}

nebulae.forEach(n=>{const g=bgCtx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
g.addColorStop(0,n.c1);g.addColorStop(1,'transparent');bgCtx.fillStyle=g;bgCtx.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2)});
stars.forEach(s=>{s.b+=s.bd;if(s.b>1||s.b<0.3)s.bd*=-1;bgCtx.globalAlpha=s.b;bgCtx.fillStyle=s.c;

function initMine(id){
if(MS[id])return;const numShafts=30+id*5;
MS[id]={unlocked:id===0,prestige:0,shafts:[],
elevator:{level:1,load:0,pos:0,dir:1,tripProg:0},
warehouse:{level:1,stored:0},maintenance:100};
for(let i=0;i<numShafts;i++)MS[id].shafts.push({unlocked:i===0,level:i===0?1:0,workers:1,mined:0,accident:false,mgrId:null});
}

// ===== CALCULATIONS =====
function shaftUnlockCost(i,mid){return Math.floor(100*Math.pow(7,i)*MINES[mid].mult)}
function shaftUpCost(i,mid){const s=MS[mid].shafts[i];return Math.floor(50*Math.pow(4.5,i)*Math.pow(1.11,s.level)*MINES[mid].mult)}
function shaftProd(i,mid){
const st=MS[mid],sh=st.shafts[i];if(!sh.unlocked||sh.level<1||sh.accident)return 0;
const base=10*Math.pow(1.5,i);const lvl=sh.level*(1+sh.level*0.1);const w=sh.workers;
const mine=MINES[mid].mult;const pres=1+st.prestige*0.15;const gPres=GS.prestigeMult;
const boost=getBoostMult();const mgr=getMgrMult(sh.mgrId);
const rMine=1+(getRes('r0')*0.15)+(getRes('r1')*0.1)+(getRes('r9')*0.4);
const rEco=1+(getRes('r8')*0.5);
const sk=1+(getSkill('s0')*0.08)+(getSkill('s1')*0.05)+(getSkill('s2')*0.1)+(getSkill('s9')*0.15);
const planet=PLANETS[GS.curPlanet].mineral;const maint=st.maintenance/100;
const morale=GS.morale/100;const robot=1+GS.robots*0.05;
const artBonus=getArtifactMult('prod');const legBonus=getLegacyMult();
const crit=Math.random()<GS.critChance?2:1;
return base*lvl*w*mine*pres*gPres*boost*mgr*rMine*rEco*sk*planet*maint*morale*robot*artBonus*legBonus*crit;
}
function shaftCap(i,mid){return 100*Math.pow(2,MS[mid].shafts[i].level)*(1+getRes('r4')*0.15)}
function elevCap(mid){return 100*Math.pow(2,MS[mid].elevator.level)*(1+getRes('r4')*0.15)}
function elevSpd(mid){return(1+MS[mid].elevator.level*0.25)*(1+getRes('r3')*0.2)*(1+getRes('r5')*0.3)*(1+getRes('r10')*0.35)}
function elevCost(mid){return Math.floor(200*Math.pow(1.35,MS[mid].elevator.level))}
function whCap(mid){return 1000*Math.pow(3,MS[mid].warehouse.level)*(1+getRes('r4')*0.15)}
function whSellSpd(mid){return 10*Math.pow(1.5,MS[mid].warehouse.level)*(1+getRes('r7')*0.15)*(1+getRes('r6')*0.1)*getArtifactMult('speed')}
function whCost(mid){return Math.floor(300*Math.pow(1.35,MS[mid].warehouse.level))}
function totalIncome(){const st=MS[GS.curMine];if(!st)return 0;let t=0;st.shafts.forEach((s,i)=>{if(s.unlocked&&s.level>0)t+=shaftProd(i,GS.curMine)});return t}
function getMgrMult(id){if(id===null)return 1;const o=GS.ownedMgrs.find(m=>m.id===id);if(!o)return 1;const d=MGRS.find(m=>m.id===id);return d?d.bonus*(1+o.level*0.1):1}
function getBoostMult(){let m=1;const n=Date.now();GS.activeBoosts=GS.activeBoosts.filter(b=>b.end>n);GS.activeBoosts.forEach(b=>m*=b.mult);return m}
function getRes(id){return GS.research[id]||0}
function getSkill(id){return GS.skills[id]||0}
function getArtifactMult(type){let m=1;GS.artifacts.forEach(aid=>{const a=ARTIFACTS.find(x=>x.id===aid);
if(a&&(a.bonus.type===type||a.bonus.type==='all'))m*=a.bonus.val});return m}
function getLegacyMult(){let m=1;Object.keys(GS.legacy).forEach(lid=>{if(GS.legacy[lid]){const l=LEGACY_UPGRADES.find(x=>x.id===lid);if(l)m*=l.mult}});return m}
function calcMax(cash,costFn,curLv){let c=cash,ups=0,lv=curLv,tot=0;while(ups<100000){const co=costFn(lv);if(co>1e300)break;if(c>=co){c-=co;tot+=co;lv++;ups++}else break}return{ups,tot,lv}}

lvlUpMgr(id){if(GS.gems<10){notify('Need 10 gems!','error');return}

activateSuper(id){const sm=SUPER_MGRS.find(s=>s.id===id);if(!sm)return;

if(GS.resPts<co){notify('Need '+co+' research pts!','error');return}
GS.resPts-=co;GS.research[id]=(cur||0)+1;notify(r.name+' upgraded!','success');renderTab();updateUI()},
buySkill(id){const s=SKILLS.find(x=>x.id===id);if(!s)return;

notify(s.name+' upgraded!','success');renderTab();updateUI()},

buyMarket(id){const st=GS.market[id];if(GS.cash<st.price)return;
GS.cash-=st.price;st.qty++;st.price*=1.02;GS.trades++;renderTab();updateUI()},

notify('Sold for '+$(st.price),'success');renderTab();updateUI()},
placeTower(slot){if(GS.towers[slot]!==null){GS.towers[slot]=null;renderTab();return}
let h='<div class="modal-title">Select Tower</div>';
TOWERS.forEach(t=>{h+='<button onclick="G.confirmTower('+slot+','+t.id+')" class="btn-action" style="width:100%;margin-bottom:3px;text-align:left">'+t.icon+' '+t.name+' - '+$(t.cost)+' ('+t.dps+' DPS)</button>'});
h+='<button onclick="G.closeModal()" class="btn-action" style="width:100%;margin-top:6px">Cancel</button>';showModal(h)},
confirmTower(slot,tid){const t=TOWERS[tid];if(GS.cash<t.cost)return;
GS.cash-=t.cost;GS.towers[slot]=tid;G.closeModal();notify(t.name+' placed!','success');renderTab();updateUI()},
startRaid(){if(GS.raidActive)return;GS.raidActive=true;GS.raidWave++;
GS.raidHP=1000*Math.pow(2,GS.raidWave);GS.raidMaxHP=GS.raidHP;notify('⚔ Raid Wave '+GS.raidWave+'!','error');renderTab()},
unlockPlanet(id){if(GS.cash<PLANETS[id].cost)return;GS.cash-=PLANETS[id].cost;GS.planets[id]=true;
notify(PLANETS[id].name+' unlocked!','gold');coins(20);renderTab();updateUI()},
selectPlanet(id){if(!GS.planets[id])return;GS.curPlanet=id;notify('Moved to '+PLANETS[id].name,'info');renderTab();updateUI()},
startExpedition(id){if(GS.expeditions[id])return;
GS.expeditions[id]={start:Date.now(),dur:EXPEDITIONS[id].dur*1000};notify('Expedition started!','info');renderTab()},
claimExpedition(id){const st=GS.expeditions[id];if(!st||Date.now()-st.start<st.dur)return;
const ex=EXPEDITIONS[id];const pm=PLANETS[GS.curPlanet].mineral;
GS.cash+=ex.reward.cash*pm;GS.gems+=ex.reward.gems;GS.totalCash+=ex.reward.cash*pm;
delete GS.expeditions[id];notify('Claimed!','gold');coins(15);renderTab();updateUI()},
buyLegacy(id){const l=LEGACY_UPGRADES.find(x=>x.id===id);if(!l||GS.legacy[id])return;
if(GS.prestigePts<l.cost){notify('Need '+l.cost+' prestige pts!','error');return}
GS.prestigePts-=l.cost;GS.legacy[id]=true;notify(l.name+' acquired!','gold');renderTab();updateUI()},
showPrestige(){const gain=Math.floor(Math.pow(GS.totalCash/1e9,0.5)*(1+getSkill('s5')*0.1)*getArtifactMult('prestige'));
const rGain=Math.floor(gain*0.5);const sGain=Math.floor(gain*0.3);const relGain=Math.floor(gain*0.1);
let h='<div class="modal-title">⭐ Prestige</div><div style="text-align:center">';
h+='<div style="font-size:24px;color:var(--neon-gold);margin:10px 0;font-family:Orbitron">+'+gain+' ⭐</div>';
h+='<div style="font-size:13px;color:var(--neon-pink);margin:6px 0">+'+rGain+' 🔬 Research</div>';
h+='<div style="font-size:13px;color:var(--neon-green);margin:6px 0">+'+sGain+' 🌳 Skill Points</div>';
h+='<div style="font-size:13px;color:var(--neon-orange);margin:6px 0">+'+relGain+' 🏺 Relics</div>';
h+='<div style="color:var(--neon-red);font-size:11px;margin:10px 0">⚠ This resets current mine!</div>';
h+='<button onclick="G.doPrestige()" class="btn-action" style="width:100%;padding:8px;margin-bottom:6px;border-color:var(--neon-purple)" '+(gain>0?'':'disabled')+'>Prestige Now</button>';
h+='<button onclick="G.closeModal()" class="btn-action" style="width:100%">Cancel</button></div>';showModal(h)},
doPrestige(){const gain=Math.floor(Math.pow(GS.totalCash/1e9,0.5)*(1+getSkill('s5')*0.1)*getArtifactMult('prestige'));
if(gain<=0)return;const rGain=Math.floor(gain*0.5);const sGain=Math.floor(gain*0.3);const relGain=Math.floor(gain*0.1);
GS.prestigePts+=gain;GS.resPts+=rGain;GS.skillPts+=sGain;GS.relics+=relGain;
GS.prestigeMult=1+GS.prestigePts*0.1;
const mid=GS.curMine;MS[mid].prestige++;
const startShafts=GS.legacy['l2']?5:1;
MS[mid].shafts.forEach((s,i)=>{s.level=i<startShafts?1:0;s.unlocked=i<startShafts;s.mined=0;s.accident=false;s.mgrId=null;s.workers=1});
MS[mid].elevator={level:1,load:0,pos:0,dir:1,tripProg:0};
MS[mid].warehouse={level:1,stored:0};MS[mid].maintenance=100;
GS.cash=100;GS.totalCash=0;
G.closeModal();notify('Prestiged! +'+gain+'⭐ +'+rGain+'🔬 +'+sGain+'🌳 +'+relGain+'🏺','gold');coins(30);renderShafts();updateUI()},
showMines(){let h='<div class="modal-title">🗺 Select Mine</div><div style="max-height:400px;overflow-y:auto">';
MINES.forEach(m=>{initMine(m.id);const st=MS[m.id];const cur=GS.curMine===m.id;
h+='<div class="panel-card" style="display:flex;align-items:center;justify-content:space-between;'+(cur?'border-color:var(--neon-gold)':'')+'">';
h+='<div style="display:flex;align-items:center;gap:6px"><span style="font-size:20px">'+m.icon+'</span>';
h+='<div><div style="font-weight:700;font-size:11px">'+m.name+'</div><div style="font-size:9px;color:rgba(255,255,255,0.4)">'+m.mult+'x mult</div></div></div>';

'<button onclick="G.unlockMine('+m.id+')" class="btn-up" style="font-size:10px" '+(GS.cash>=m.cost?'':'disabled')+'>'+$(m.cost)+'</button>';
h+='</div>'});
h+='</div><button onclick="G.closeModal()" class="btn-action" style="width:100%;margin-top:8px">Close</button>';showModal(h)},
selectMine(id){GS.curMine=id;document.getElementById('dMineName').textContent=MINES[id].name;
document.getElementById('dMineIcon').textContent=MINES[id].icon;G.closeModal();renderShafts();updateUI()},
unlockMine(id){if(GS.cash<MINES[id].cost)return;GS.cash-=MINES[id].cost;MS[id].unlocked=true;
notify(MINES[id].name+' unlocked!','gold');G.showMines()},
showArtifacts(){let h='<div class="modal-title">🏺 Artifacts</div>';
if(GS.artifacts.length===0)h+='<div class="panel-card" style="text-align:center;color:rgba(255,255,255,0.4)">No artifacts yet. Try Lucky Dig!</div>';
GS.artifacts.forEach(aid=>{const a=ARTIFACTS.find(x=>x.id===aid);if(!a)return;
h+='<div class="artifact-card relic-glow rarity-'+a.rarity+'"><div style="display:flex;align-items:center;gap:6px">';
h+='<span style="font-size:22px">'+a.icon+'</span><div><div style="font-weight:700;font-size:12px">'+a.name+'</div>';

h+='<button onclick="G.closeModal()" class="btn-action" style="width:100%;margin-top:8px">Close</button>';showModal(h)},
hireRobot(){const co=GS.robots<5?50:GS.robots<10?100:GS.robots<20?200:500;
if(GS.gems<co){notify('Need '+co+' gems!','error');return}
GS.gems-=co;GS.robots++;notify('Robot hired! (+5% production)','success');renderTab();updateUI()},
doMaintenance(){const co=Math.max(100,Math.floor(GS.cash*0.05));if(GS.cash<co){notify('Not enough!','error');return}
GS.cash-=co;MS[GS.curMine].maintenance=Math.min(100,MS[GS.curMine].maintenance+20);notify('Maintenance +20%!','success');updateUI()},
showSettings(){let h='<div class="modal-title">⚙ Settings</div><div style="display:flex;flex-direction:column;gap:6px">';
h+='<button onclick="G.exportSave()" class="btn-action" style="width:100%">📤 Export Save</button>';
h+='<button onclick="G.importSavePrompt()" class="btn-action" style="width:100%">📥 Import Save</button>';
h+='<button onclick="G.confirmReset()" class="btn-action" style="width:100%;border-color:var(--neon-red)">🗑 Reset All</button>';
h+='</div><button onclick="G.closeModal()" class="btn-action" style="width:100%;margin-top:8px">Close</button>';showModal(h)},
exportSave(){try{G.save();navigator.clipboard.writeText(btoa(JSON.stringify({gs:GS,ms:MS})));notify('Save copied!','success')}catch(e){prompt('Copy:',btoa(JSON.stringify({gs:GS,ms:MS})))}},
importSavePrompt(){let h='<div class="modal-title">📥 Import</div>';

h+='<button onclick="G.doImport()" class="btn-action" style="width:100%;margin-top:6px">Import</button>';
h+='<button onclick="G.closeModal()" class="btn-action" style="width:100%;margin-top:3px">Cancel</button>';showModal(h)},
doImport(){try{const d=JSON.parse(atob(document.getElementById('importArea').value));
Object.assign(GS,d.gs);Object.assign(MS,d.ms);G.closeModal();notify('Imported!','success');renderShafts();renderTab();updateUI()}catch(e){notify('Invalid!','error')}},
confirmReset(){if(confirm('DELETE ALL progress?')){if(confirm('Really?')){localStorage.removeItem('simtSave');location.reload()}}},
save(){try{localStorage.setItem('simtSave',JSON.stringify({gs:GS,ms:MS,t:Date.now()}));notify('Saved!','success')}catch(e){}},
load(){try{const d=localStorage.getItem('simtSave');if(!d)return false;const p=JSON.parse(d);
Object.assign(GS,p.gs);Object.assign(MS,p.ms);
if(!GS.artifacts)GS.artifacts=[];if(!GS.legacy)GS.legacy={};if(!GS.relics)GS.relics=0;
if(!GS.luckyDigCd)GS.luckyDigCd=0;if(!GS.totalClicks)GS.totalClicks=0;if(!GS.critChance)GS.critChance=0.05;

return true}catch(e){return false}},
closeModal(){document.getElementById('modalWrap').classList.remove('show')},

function drawCharts(){
MARKET_ITEMS.forEach(it=>{const cv=document.getElementById('chart_'+it.id);if(!cv)return;
const ctx=cv.getContext('2d');const st=GS.market[it.id];if(!st)return;
const w=cv.width,h=cv.height;ctx.clearRect(0,0,w,h);const hist=st.history;if(hist.length<2)return;
const mn=Math.min(...hist),mx=Math.max(...hist);const range=mx-mn||1;
ctx.strokeStyle='rgba(0,212,255,0.8)';ctx.lineWidth=2;ctx.beginPath();
hist.forEach((v,i)=>{const x=(i/(hist.length-1))*w;const y=h-(((v-mn)/range)*h*0.8+h*0.1);
i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke();
ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'rgba(0,212,255,0.2)');g.addColorStop(1,'transparent');
ctx.fillStyle=g;ctx.fill()})
}

document.getElementById('bWhUp').innerHTML='⬆ '+$(whCost(GS.curMine));
document.getElementById('bWhUp').disabled=GS.cash<whCost(GS.curMine);
document.getElementById('dWhBar').style.width=Math.min(100,(st.warehouse.stored/whCap(GS.curMine))*100)+'%';
const bd=document.getElementById('dBoosts');const now=Date.now();
bd.innerHTML=GS.activeBoosts.filter(b=>b.end>now).map(b=>{const rem=Math.ceil((b.end-now)/1000);
return'<span style="background:rgba(255,215,0,0.2);border:1px solid var(--neon-gold);padding:1px 6px;border-radius:5px;font-size:9px;font-weight:700;color:var(--neon-gold)">⚡'+b.type+' '+rem+'s</span>'}).join('');
}

// ===== GAME LOOP =====
function gameLoop(){
const now=Date.now();const dt=(now-lastTick)/1000;lastTick=now;
const st=MS[GS.curMine];if(!st){requestAnimationFrame(gameLoop);return}
GS.playTime+=dt;mktTimer+=dt;achieveTimer+=dt;shaftTimer+=dt;raidTimer+=dt;maintTimer+=dt;

st.shafts.forEach((sh,i)=>{
if(!sh.unlocked||sh.level<1||sh.accident)return;
const prod=shaftProd(i,GS.curMine)*dt;const cap=shaftCap(i,GS.curMine);
sh.mined=Math.min(cap,sh.mined+prod);
if(sh.mgrId!==null&&sh.mined>=cap*0.5){
const eCap=elevCap(GS.curMine);const transfer=Math.min(sh.mined,eCap-st.elevator.load);
if(transfer>0){sh.mined-=transfer;st.elevator.load+=transfer}}});

const eSpd=elevSpd(GS.curMine);
st.elevator.tripProg+=dt*eSpd*0.15;
if(st.elevator.tripProg>=1){st.elevator.tripProg=0;st.elevator.dir*=-1;
if(st.elevator.dir===-1&&st.elevator.load>0){
const wCap=whCap(GS.curMine);const transfer=Math.min(st.elevator.load,wCap-st.warehouse.stored);
st.warehouse.stored+=transfer;st.elevator.load-=transfer}
if(st.elevator.dir===1){const eCap=elevCap(GS.curMine);
st.shafts.forEach(sh=>{if(sh.mined>0&&st.elevator.load<eCap){
const t=Math.min(sh.mined,eCap-st.elevator.load);sh.mined-=t;st.elevator.load+=t}})}}
st.elevator.pos=st.elevator.dir===1?st.elevator.tripProg:1-st.elevator.tripProg;

if(st.warehouse.stored>0){const sell=whSellSpd(GS.curMine)*dt;const sold=Math.min(st.warehouse.stored,sell);
st.warehouse.stored-=sold;GS.cash+=sold;GS.totalCash+=sold}

if(maintTimer>10){maintTimer=0;st.maintenance=Math.max(10,st.maintenance-0.5);
GS.morale=Math.max(10,Math.min(100,GS.morale+(Math.random()>0.5?0.5:-0.3)));
GS.ceoStress=Math.max(5,Math.min(95,GS.ceoStress+(Math.random()>0.6?1:-0.5)));
GS.reputation=Math.max(10,Math.min(100,GS.reputation+(Math.random()>0.5?0.3:-0.2)))}

const accidentRate=0.0003*(1-getSkill('s7')*0.05);
if(Math.random()<accidentRate*dt){const active=st.shafts.filter(s=>s.unlocked&&!s.accident&&s.level>0);
if(active.length>0){const victim=active[Math.floor(Math.random()*active.length)];
victim.accident=true;notify('⚠ Accident!','error');renderShafts()}}

if(Math.random()<0.001*dt*(1+getSkill('s4')*0.05)*getArtifactMult('gems')){GS.gems++;notify('+1 💎','info')}

if(mktTimer>5){mktTimer=0;MARKET_ITEMS.forEach(it=>{const s=GS.market[it.id];if(!s)return;
s.price=Math.max(it.base*0.2,s.price*(1+((Math.random()-0.5)*2)*it.vol));
s.history.push(s.price);if(s.history.length>30)s.history.shift()});
if(curTab==='market')renderTab()}

if(GS.raidActive&&raidTimer>1){raidTimer=0;const dps=getTotalDPS();GS.raidHP-=dps;
if(GS.raidHP<=0){GS.raidActive=false;GS.raidsWon++;
const reward=1000*Math.pow(5,GS.raidWave);const gemReward=GS.raidWave*5;
GS.cash+=reward;GS.totalCash+=reward;GS.gems+=gemReward;
notify('⚔ Won! +'+$(reward)+' +💎'+gemReward,'gold');coins(20);
if(curTab==='combat')renderTab()}}

if(achieveTimer>3){achieveTimer=0;ACHIEVEMENTS.forEach(a=>{if(!GS.achievements.includes(a.id)&&a.check()){
GS.achievements.push(a.id);GS.gems+=a.reward;
showAchievement('🏆 '+a.name+' (+💎'+a.reward+')');notify('Achievement: '+a.name+'!','gold')}})}

if(shaftTimer>2){shaftTimer=0;renderShafts()}
updateUI();requestAnimationFrame(gameLoop);
}

// ===== HELPERS =====
function showModal(html){document.getElementById('modalWrap').classList.add('show');document.getElementById('modalBox').innerHTML=html}
function notify(msg,type='info'){const n=document.createElement('div');n.className='notif notif-'+type;
n.textContent=msg;document.getElementById('notifs').appendChild(n);setTimeout(()=>n.remove(),3000)}
function floatText(text,color){const el=document.createElement('div');el.className='float-txt';
el.style.color=color;el.style.left='50%';el.style.top='40%';el.style.fontSize='22px';
el.textContent=text;document.body.appendChild(el);setTimeout(()=>el.remove(),1500)}
function coins(n){if(!GS.settings.particles)return;for(let i=0;i<Math.min(n,15);i++){
setTimeout(()=>{const c=document.createElement('div');c.className='coin-part';c.textContent='💰';
c.style.left=Math.random()*window.innerWidth+'px';c.style.top='-20px';
document.body.appendChild(c);setTimeout(()=>c.remove(),2000)},i*40)}}
function showAchievement(text){const el=document.createElement('div');el.className='achievement-pop';
el.textContent=text;document.body.appendChild(el);setTimeout(()=>el.remove(),2500)}

// ===== INIT =====
(function init(){
G.load();initMine(0);G.initMarket();
SUPER_MGRS.forEach(sm=>{if(!GS.superMgrs[sm.id])GS.superMgrs[sm.id]=0});
if(!GS.artifacts)GS.artifacts=[];if(!GS.legacy)GS.legacy={};
if(!GS.relics)GS.relics=0;if(!GS.luckyDigCd)GS.luckyDigCd=0;
GS.critChance=0.05+getSkill('s3')*0.03;
renderShafts();renderTab();updateUI();
requestAnimationFrame(gameLoop);
setInterval(()=>{if(GS.settings.autoSave)G.save()},30000);
document.getElementById('modalWrap').addEventListener('click',e=>{if(e.target===document.getElementById('modalWrap'))G.closeModal()});
console.log('🌌 Super Idle Miner Tycoon Ultimate loaded!');
})();
</script>
</body>
